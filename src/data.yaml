site:
    meta:
      title: "The connected archive for your conserved memories"
      description: "Connected Data·Connected Devices·Convenient Access"
    slogan: "The connected archive for your conserved memories"
    short: "<span class=\"text-xl block text-center\"><br>Connected Data · Connected Devices · Convenient Access</span><br><span>Conshelv is a local-first photo management software that helps you efficiently organize and access your photos across devices while keeping the full sovereignty of your data.</span>"
    hero: https://images.unsplash.com/photo-1497942304796-b8bc2cc898f3?ixlib=rb-1.2.1&q=85&fm=jpg&crop=entropy&cs=srgb&w=1200
    sections_header: "This is how Conshelv helps you to manage your photos"
    sections:
      - title: Hierarchical Tagging
        img: https://images.unsplash.com/photo-1523698120758-030a38a90d16?q=80&w=1172&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
        img_attrib: Photo by <a href="https://unsplash.com/de/@brisch27?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Brigitta Schneiter</a> auf <a href="https://unsplash.com/de/fotos/hangende-graustufenfotos-MHGDVDWjAb4?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        paragraphs: 
         - "Instead of using a flat list of tags, Conshelv allows you to create a hierarchical structure of tags. This way, you can organize your photos in a more meaningful way and easily find related images."
         - "For example, you can create a tag for 'Vacation' and then create sub-tags for each destination you visited. Simultaneously you might have tags for camera, lens and subjects. This way, you can easily describe all the photos from a specific trip without having to decide by which criteria to organize them."
      - title: Smart Collections
        img: https://images.unsplash.com/photo-1677658990177-cb9d1a5af165?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
        img_attrib: Photo by <a href="https://unsplash.com/de/@squared_one1?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Kristyna Squared.one</a> auf <a href="https://unsplash.com/de/fotos/eine-person-die-eine-zahnburste-uber-ein-buch-halt-RlctctT5gt0?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>     
        paragraphs: 
         - "Conshelv allows you to create smart collections based on your tags. This way, you can easily find all the photos that match a specific criteria without having to manually search through your entire collection."
         - "For example, you can create a smart collection for all photos tagged with 'Vacation' and 'Beach'. This way, you can easily find all the photos from your beach vacations without having to manually search through your entire collection."
      - title: Synchronization between devices
        img: https://images.unsplash.com/photo-1495564103921-67412af57da3?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=764&q=80
        img_attrib: Photo by <a href="https://unsplash.com/@anckor?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Julian O'hayon</a> on <a href="https://unsplash.com/s/photos/digital-devices?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        paragraphs: 
         - "Conshelv can synchronize your archive in your Wifi network directly between your devices. This works without relying on a an external cloud service. "
         - "Sync only a selection of your images to save space, without sacrificing access to your entire collection. Conshelv remembers the original storage locations on each device so you can restore your complete collection at any time. "
         - "Synchronized pictures are always stored offline on your devices, so you can access them even without an internet connection."

      - title: Export and Backup
        img: https://images.unsplash.com/photo-1491975474562-1f4e30bc9468?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
        img_attrib: Photo by <a href="https://unsplash.com/de/@andrewtneel?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Andrew Neel</a> auf <a href="https://unsplash.com/de/fotos/madchen-tragt-graues-langarmeliges-hemd-mit-macbook-pro-auf-braunem-holztisch-ute2XAFQU2I?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        paragraphs:
          - "Conshelv allows you to export your photos and metadata in a standardized format. This way, you can easily migrate your collection to another software if you want to."
          - "Since a Conshelv archive acts as a central reference for all your photos in a single file, you can easily create backups of your entire collection by simply copying the archive file to another location. This way, you can ensure that your photos are safe and secure even if something happens to your computer or storage device."
