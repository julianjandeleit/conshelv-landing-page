    early_access:
      title: "Early Access"
      text: "Conshelv befindet sich in kontinuierlicher Entwicklung. Bei Interesse kann die Vorab-Version auf Anfrage kostenlos benutzt und ausprobiert werden. Schreiben Sie dazu gerne auf <a class='underline text-blue-500' href='%INSTAGRAM_LINK%'>Instagram</a>. <br><br> Bitte beachten Sie dass in einer Vorveröffentlichung Fehlfunktionen nicht ausgeschlossen werden und Bedingungen sich ändern können."
    
    roadmap_section:
      title: "Roadmap"
      text: "Mittelfristig soll der Quellcode von Conshelv als Open-Source Projekt veröffentlicht werden. Geplante Änderungen und Updates können in der <a class='link-primary font-bold underline text-blue-500' href='%ROADMAP_LINK%'>Roadmap</a> gesehen werden."
    
    feedback_section:
      title: "Feedback & Vorschläge"
      text: "Feedback, neue Vorschläge oder auch Bugs können in unserem <a class='link-primary font-bold underline text-blue-500' href='%FEEDBACK_LINK%'>Feedback-Board</a> berichtet und diskutiert werden. Vielversprechende Ideen werden in die Roadmap übernommen und in einem zukünftigen Release erscheinen."
